<!DOCTYPE html>
<html lang="en">
<head>
    <title>Karen Xiao</title>
    <link href="styles.css" rel="stylesheet"/>
    <link rel="icon" href="images/KX.png" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>
    <main>
        <!-- Navigation -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
            <div class="container">
                <a class="navbar-brand" href="index.html">Karen Xiao</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link active" href="research.html">Research</a></li>
                        <li class="nav-item"><a class="nav-link" href="CV.html">CV</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Publications -->
        <section class="py-5 mt-4">
            <div class="container">
                <h3 class="mb-4">Publications</h3>
                <div id="publications-list">
                    <p class="text-muted">Loading publications...</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p><span class="text-muted">© Karen Xiao, 2025. // last updated: May 26, 2026</span></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        fetch('documents/publications.csv')
            .then(r => r.text())
            .then(csv => {
                const lines = csv.trim().split('\n');
                const headers = parseCSVLine(lines[0]);
                const pubs = lines.slice(1).map(line => {
                    const values = parseCSVLine(line);
                    return Object.fromEntries(headers.map((h, i) => [h.trim(), (values[i] || '').trim()]));
                });

                // Group by year
                const byYear = {};
                pubs.forEach(p => {
                    if (!byYear[p.year]) byYear[p.year] = [];
                    byYear[p.year].push(p);
                });

                const container = document.getElementById('publications-list');
                container.innerHTML = '';

                Object.keys(byYear).sort((a, b) => b - a).forEach(year => {
                    const yearHeader = document.createElement('h5');
                    yearHeader.className = 'dates mt-4 mb-3';
                    yearHeader.textContent = year;
                    container.appendChild(yearHeader);

                    byYear[year].forEach(pub => {
                        const card = document.createElement('div');
                        card.className = 'pub-card mb-3';
                        card.innerHTML = `
                            <div class="pub-title">${pub.title}</div>
                            <div class="pub-authors">${pub.authors}</div>
                            <div class="pub-venue">${pub.venue}</div>
                            <div class="d-flex gap-2 mt-2">
                                ${pub.pdf ? `<a class="btn btn-primary btn-sm" href="${pub.pdf}" target="_blank"><i class="bi bi-file-earmark-pdf-fill"></i> PDF</a>` : ''}
                                ${pub.doi ? `<a class="btn btn-outline-dark btn-sm" href="${pub.doi}" target="_blank"><i class="bi bi-link-45deg"></i> DOI</a>` : ''}
                                ${pub.code ? `<a class="btn btn-outline-dark btn-sm" href="${pub.code}" target="_blank"><i class="bi bi-github"></i> Code</a>` : ''}
                                ${pub.poster ? `<a class="btn btn-outline-dark btn-sm" href="${pub.poster}" target="_blank"><i class="bi bi-display"></i> Poster</a>` : ''}
                                ${pub.website ? `<a class="btn btn-outline-dark btn-sm" href="${pub.website}" target="_blank"><i class="bi bi-window"></i> Website</a>` : ''}
                            </div>
                        `;
                        container.appendChild(card);
                    });
                });
                // Bold your name everywhere it appears
                container.innerHTML = container.innerHTML.replace(
                    /Karen Xiao/g,
                    '<span style="font-weight: 550">Karen Xiao</span>'
                );
            })
            .catch(() => {
                document.getElementById('publications-list').innerHTML = '<p class="text-muted">Could not load publications.</p>';
            });

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                if (line[i] === '"') { inQuotes = !inQuotes; }
                else if (line[i] === ',' && !inQuotes) { result.push(current); current = ''; }
                else { current += line[i]; }
            }
            result.push(current);
            return result;
        }
    </script>
</body>
</html>
