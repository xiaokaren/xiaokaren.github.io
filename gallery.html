    <style>
        .flip-grid {
            columns: 3;
            column-gap: 16px;
            padding: 1rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        @media (max-width: 1100px) { .flip-grid { columns: 3; } }
        @media (max-width: 768px)  { .flip-grid { columns: 2; column-gap: 12px; } }
        @media (max-width: 480px)  { .flip-grid { columns: 1; } }

        .flip-card {
            break-inside: avoid;
            margin-bottom: 16px;
            perspective: 1000px;
            cursor: pointer;
            display: inline-block;
            width: 100%;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        .flip-card:hover .flip-card-inner,
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front,
        .flip-card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 4px;
            overflow: hidden;
        }

        .flip-card-front {
            background: #111;
            width: 100%;
        }

        .flip-card-front img {
            width: 100%;
            display: block;
        }

        .flip-card-back {
            position: absolute;
            inset: 0;
            transform: rotateY(180deg);
            background: #fdfaf7;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 18px;
            border: 1px solid #e0d8c8;
        }

        .flip-back-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .film-brand {
            font-family: "Courier Prime", monospace;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #bbb;
        }

        .film-roll-number {
            font-family: "Courier Prime", monospace;
            font-size: 0.6rem;
            color: #ccc;
        }

        .flip-back-middle {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
        }

        .film-stamp {
            display: inline-block;
            font-family: "Courier Prime", monospace;
            color: #1682bb;
            border: 1px solid #1682bb;
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 3px 8px;
            width: fit-content;
        }

        .film-caption {
            font-family: "Playfair Display", serif;
            font-style: italic;
            font-size: 1rem;
            color: #2a2a2a;
            line-height: 1.4;
        }

        .film-note {
            font-family: "Courier Prime", monospace;
            font-size: 0.7rem;
            color: #888;
            line-height: 1.5;
        }

        .flip-back-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .film-frame-number {
            font-family: "Courier Prime", monospace;
            font-size: 1.8rem;
            color: #c8cfdd;
            font-weight: 700;
            line-height: 1;
        }

        .film-sprockets {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .film-sprocket {
            width: 10px;
            height: 7px;
            border-radius: 1px;
            border: 1px solid #1682bb;
            opacity: 0.5;
        }

        .travel-quote {
            /* border-left: 3px solid #027fc2; */
            padding: 0.4rem 0 0.4rem 1rem;
            margin: 0.5rem 0 1rem;
        }

        .travel-quote p {
            font-size: 0.6rem;
            color: #767676;
            font-style: italic;
            margin: 0;
        }

        .travel-quote footer {
            font-size: 0.78rem;
            background-color: white !important;
            color: #767676;
            /* margin-top: 4px; */
            text-align: right;
        }

    <script>
        document.querySelectorAll('.flip-card').forEach((card, i) => {
            const src      = card.dataset.src;
            const date     = card.dataset.date || '';
            const location = card.dataset.location || '';
            const caption  = card.dataset.caption || '';
            const note     = card.dataset.note || '';
            const frame    = card.dataset.frame || String(i + 1).padStart(2, '0');
            const brand    = card.dataset.brand || 'FUJIFILM SUPERIA 400';

            card.innerHTML = `
                <div class="flip-card-inner">
                    <div class="flip-card-front">
                        <img src="${src}" alt="${caption}" loading="lazy">
                    </div>
                    <div class="flip-card-back">
                        <div class="flip-back-top">
                            <span class="film-brand">${brand}</span>
                            <span class="film-roll-number">☀ DX</span>
                        </div>
                        <div class="flip-back-middle">
                            <span class="film-stamp">${date} &nbsp;|&nbsp; ${location}</span>
                            <div class="film-caption">${caption}</div>
                            ${note ? `<div class="film-note">${note}</div>` : ''}
                        </div>
                        <div class="flip-back-bottom">
                            <span class="film-frame-number">${frame}</span>
                            <div class="film-sprockets">
                                <div class="film-sprocket"></div>
                                <div class="film-sprocket"></div>
                                <div class="film-sprocket"></div>
                            </div>
                        </div>
                    </div>
                </div>`;

            card.addEventListener('click', () => card.classList.toggle('flipped'));
        });
    </script>
